<!doctype html>
<html
  lang="fr"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DashBoard</title>
  </head>
  <body>
    <header>
      <h1>mon Dashboard</h1>
    </header>
    <main>
      <div>
        <p th:text="#{welcome.user(${#authentication.name})}">!</p>
      </div>
      <div sec:authorize="hasRole('MEM')">
        <p>mon lien d'adminstration</p>
      </div>
      <div
        sec:authorize="isAnonymous()"
        th:text="${#authentication.authorities}"
      ></div>
      <div
        class="alert alert-danger"
        th:if="${ErrorMessage}"
        th:text="#{error.unauthorized}"
      ></div>
    </main>
  </body>
</html>
